<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arctos Chess Arena</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="phone-card" aria-label="Arctos Chess Arena">
      <section class="arena-grid">
        <aside class="left-panel" aria-label="Russell">
          <div class="bear-stage" aria-hidden="true">
            <div id="bear" class="bear"></div>
          </div>
          <p class="bot-rating">Bot Russell • Rating 1800</p>
        </aside>

        <section class="center-panel">
          <header class="masthead">
            <img id="logoFrame" class="logo" src="imagem/LOGOGAME1.png" alt="Arctos Game Logo" />
          </header>

          <section class="hud" aria-label="Controles de jogo">
            <p id="statusText">Sua vez (brancas).</p>
            <div class="hud-actions">
              <label for="difficultySelect">IA</label>
              <select id="difficultySelect" aria-label="Dificuldade da IA">
                <option value="easy">Facil</option>
                <option value="medium" selected>Media</option>
                <option value="hard">Dificil</option>
              </select>
              <button id="resetBtn" type="button">Novo jogo</button>
            </div>
            <p id="botPhrase" class="bot-phrase">Russell (1800): Vamos jogar um xadrez elegante.</p>
            <div class="store-cta">
              <a
                id="playStoreBtn"
                class="store-link"
                href="https://play.google.com/store/apps/details?id=com.arctos.russellsmate"
                target="_blank"
                rel="noopener noreferrer"
              >
                Baixar Russell's Mate no Google Play
              </a>
            </div>
          </section>
        </section>

        <section class="board-wrap">
          <div id="board" class="board" role="grid" aria-label="Tabuleiro de xadrez"></div>
        </section>
      </section>

      <footer class="foot-note">
        <div class="foot-left">
          <img class="footer-logo" src="imagem/LogoArctos.png" alt="Logo Arctos" />
        </div>
        <div class="foot-right">
          <a
            class="privacy-link"
            href="https://privacy-policy-steel-ten.vercel.app"
            target="_blank"
            rel="noopener noreferrer"
          >
            Politica de privacidade
          </a>
          <a class="contact-mail" href="mailto:arctosent@icloud.com">arctosent@icloud.com</a>
          <p class="contact-address">R. Shelma Lombardi Kato, L Katto, 104 Santa Cruz RONDONOPOLIS - MT 78715-211 Brazil</p>
        </div>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
